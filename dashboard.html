<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EcoVision</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for Dashboard Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-leaf"></i> EcoVision
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="live.html">Live Camera</a></li>
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
        </ul>
    </nav>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2><i class="fa-solid fa-chart-pie"></i> Analytics Dashboard</h2>
            <button id="exportBtn" class="btn"><i class="fa-solid fa-file-excel"></i> Export to Excel</button>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3 style="margin-bottom: 1rem; text-align: center;">Waste Categories Over Time</h3>
                <canvas id="categoryChart"></canvas>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 1rem;">Recent Detections</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid var(--border);">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Time</th>
                                <th style="padding: 10px;">Classes</th>
                                <th style="padding: 10px;">Items</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Table rows will be generated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="notification" class="notification"></div>

    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
