<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Waste Classification</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav>
        <a href="dashboard.html" class="logo">
            <i class="fa-solid fa-leaf"></i> Waste Classification
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="live.html">Live Camera</a></li>
            <li><a href="history.html" class="active">History</a></li>
            <li><a href="login.html" class="btn btn-danger"
                    style="color: white; padding: 0.5rem 1rem; margin-left: 1rem;"><i
                        class="fa-solid fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2><i class="fa-solid fa-clock-rotate-left" style="color: var(--primary);"></i> Detection History</h2>
            <div style="display: flex; gap: 1rem;">
                <button id="exportPdfBtn" class="btn btn-outline"><i class="fa-solid fa-file-pdf"></i> Export
                    PDF</button>
                <button id="exportExcelBtn" class="btn"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
            </div>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="padding: 1.25rem 1.5rem;">Scan ID</th>
                            <th style="padding: 1.25rem 1.5rem;">Date & Time</th>
                            <th style="padding: 1.25rem 1.5rem;">Detected Classes</th>
                            <th style="padding: 1.25rem 1.5rem;">Item Count</th>
                            <th style="padding: 1.25rem 1.5rem;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 2rem;">Loading history...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="notification" class="notification"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/history.js"></script>
</body>

</html>
