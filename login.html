<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Waste Classification</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body style="justify-content: center; align-items: center; background: linear-gradient(135deg, #f8fafc, #e0f2fe);">

    <div class="card auth-container">
        <div style="margin-bottom: 2rem;">
            <a href="#" class="logo" style="justify-content: center; font-size: 2rem;">
                <i class="fa-solid fa-leaf"></i> Waste Classification
            </a>
            <p style="margin-top: 0.5rem; font-size: 0.9rem;">Sign in to access the system</p>
        </div>

        <form id="loginForm">
            <input type="text" id="username" class="auth-input" placeholder="Username" required>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="btn" style="width: 100%; justify-content: center;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // Mock authentication - just redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
